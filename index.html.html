<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashes of the Crown</title>
  <style>
    :root {
      --bg1: #1a1020;
      --bg2: #2a1630;
      --bg3: #120b18;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #f4e9ff;
      --muted: rgba(244, 233, 255, 0.78);
      --button: #f0c8ff;
      --button-text: #2a1434;
      --accent: #ffd9ff;
      --glow: rgba(255, 220, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2) 50%, var(--bg3));
      color: var(--text);
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      padding: 14px 18px 0;
      display: flex;
      justify-content: center;
    }

    #logo {
      max-width: 1080px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--panel-border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    #logo .titlewrap {
      min-width: 0;
    }

    #logo h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.05;
      color: #ffe6ff;
      text-shadow: 0 0 18px var(--glow);
    }

    #logo .tagline {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    #logo .logoButtons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    #logo .logoButtons button {
      width: auto;
      margin: 0;
      padding: 10px 14px;
      white-space: nowrap;
    }

    #mainLayout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(260px, 0.8fr);
      gap: 18px;
      max-width: 1080px;
      width: 100%;
      margin: 18px auto 0;
      padding: 0 18px 22px;
    }

    @media (max-width: 880px) {
      #mainLayout {
        grid-template-columns: 1fr;
      }
      #logo {
        flex-direction: column;
        align-items: stretch;
      }
      #logo .logoButtons {
        justify-content: flex-start;
      }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      backdrop-filter: blur(4px);
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      opacity: 0.97;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .story p {
      margin: 0 0 14px;
      white-space: pre-wrap;
      font-size: 16px;
    }

    .small {
      font-size: 13px;
      opacity: 0.84;
      margin-top: 10px;
      line-height: 1.5;
    }

    .bio {
      margin: 10px 0 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bio strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0 0;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      font-family: Georgia, serif;
    }

    button:hover { filter: brightness(1.03); }

    .sideTitle {
      margin: 0 0 10px;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .sideBlock {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sideBlock:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .sideList {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }

    .sideList li {
      margin-bottom: 8px;
    }

    .meter {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      margin-top: 6px;
    }

    .meter > div {
      height: 100%;
      background: linear-gradient(90deg, rgba(255,217,255,0.95), rgba(173, 111, 255, 0.95));
      width: 0%;
    }

    .miniStat {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .inlineNote {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <div id="logo">
        <div class="titlewrap">
          <h1>Ashes of the Crown</h1>
          <div class="tagline">A knight, a prince, and the dragon that took him into the dark.</div>
        </div>
        <div class="logoButtons">
          <button id="saveBtn">Save</button>
          <button id="continueBtn">Continue</button>
          <button id="newBtn">New Game</button>
          <button id="guideBtn">Companion Guide</button>
        </div>
      </div>
    </div>

    <div id="mainLayout">
      <main id="game"></main>
      <aside id="sidePanel"></aside>
    </div>
  </div>

  <script>
    const SAVE_KEY = "mariah_scott_quest_save_v3";

    const companionMeta = {
      jasmine: {
        name: "Jasmine",
        role: "Princess and secret-route expert",
        bio: "She knows the castle’s tunnels, hidden doors, and the quickest way through court nonsense. Sharp, observant, and not romantic with the main cast."
      },
      anderson: {
        name: "Anderson",
        role: "Blacksmith’s daughter and frontline fighter",
        bio: "She swings first, protects the poor, and trusts action over speeches. Fierce, loyal, and impossible to ignore."
      },
      dahlia: {
        name: "Dahlia",
        role: "Mage and truth-reader",
        bio: "Blue fire in her hands, lies in her sights. Brilliant, beautiful, and excellent at spotting deception before it blooms."
      },
      bailey: {
        name: "Bailey",
        role: "Stable hand and tracker",
        bio: "She reads tracks, animals, and tiny shifts in feeling better than most people read maps. Awkward in conversation, but deeply observant."
      },
      shayne: {
        name: "Shayne",
        role: "Court advisor and dragon researcher",
        bio: "Scott’s best friend, worried by nature, and extremely useful when the mission needs strategy, money sense, or dragon intel."
      }
    };

    function freshState() {
      return {
        courage: 0,
        compassion: 0,
        cunning: 0,
        scott: 3,
        approval: {
          jasmine: 0,
          anderson: 0,
          dahlia: 0,
          bailey: 0,
          shayne: 0
        },
        party: [],
        flags: {}
      };
    }

    function freshUI() {
      return {
        screen: "title",
        picker: null,
        message: ""
      };
    }

    let state = freshState();
    let ui = freshUI();

    function companionKeys() {
      return Object.keys(companionMeta);
    }

    function has(key) {
      return state.party.includes(key);
    }

    function nameOf(key) {
      return companionMeta[key].name;
    }

    function setFlag(key) {
      state.flags[key] = true;
    }

    function seen(key) {
      return !!state.flags[key];
    }

    function add(stat, amount) {
      state[stat] += amount;
    }

    function adjustApproval(key, amount) {
      state.approval[key] += amount;
    }

    function saveGame() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ state, ui }));
        ui.message = "Game saved.";
        renderShell();
        render();
      } catch (e) {}
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data || !data.state || !data.ui) return false;
        state = data.state;
        ui = data.ui;
        return true;
      } catch (e) {
        return false;
      }
    }

    function clearSave() {
      try {
        localStorage.removeItem(SAVE_KEY);
      } catch (e) {}
    }

    function resetGame() {
      state = freshState();
      ui = freshUI();
    }

    function setScreen(screen) {
      ui.screen = screen;
      ui.picker = null;
      ui.message = "";
      renderShell();
      render();
      saveGameToStorageOnly();
    }

    function saveGameToStorageOnly() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ state, ui }));
      } catch (e) {}
    }

    function renderShell() {
      const canContinue = !!localStorage.getItem(SAVE_KEY);
      document.getElementById("continueBtn").style.opacity = canContinue ? "1" : "0.45";
      document.getElementById("continueBtn").disabled = !canContinue;
      document.getElementById("saveBtn").disabled = ui.screen === "title";
    }

    function renderPanel() {
      const panel = document.getElementById("sidePanel");
      const party = state.party.length ? state.party.map(nameOf).join(", ") : "none";

      const approvalRows = companionKeys().map(key => {
        const value = state.approval[key];
        const width = Math.max(0, Math.min(100, (value + 4) * 12.5));
        return `
          <div class="miniStat">${companionMeta[key].name}: ${value}</div>
          <div class="meter"><div style="width:${width}%"></div></div>
        `;
      }).join("");

      const currentParty = state.party.length
        ? state.party.map(key => `<li><strong>${companionMeta[key].name}</strong> — ${companionMeta[key].role}</li>`).join("")
        : `<li>No companions selected right now.</li>`;

      const pickNote = ui.screen === "picker"
        ? `<div class="inlineNote">On the selection screen, Mariah can choose one companion, all companions, or any number in between.</div>`
        : "";

      panel.innerHTML = `
        <div class="card">
          <div class="sideBlock">
            <div class="sideTitle">Stats</div>
            <div class="miniStat">Courage: ${state.courage}</div>
            <div class="miniStat">Compassion: ${state.compassion}</div>
            <div class="miniStat">Cunning: ${state.cunning}</div>
            <div class="miniStat">Scott bond: ${state.scott}</div>
          </div>

          <div class="sideBlock">
            <div class="sideTitle">Current Party</div>
            <ul class="sideList">${currentParty}</ul>
            ${pickNote}
          </div>

          <div class="sideBlock">
            <div class="sideTitle">Companion Approval</div>
            ${approvalRows}
          </div>

          <div class="sideBlock">
            <div class="sideTitle">Companion Notes</div>
            <ul class="sideList">
              <li><strong>Jasmine</strong> knows secret tunnels and hidden exits.</li>
              <li><strong>Anderson</strong> leads with steel and protects the weak.</li>
              <li><strong>Dahlia</strong> reads lies and works blue fire.</li>
              <li><strong>Bailey</strong> tracks and notices what others miss.</li>
              <li><strong>Shayne</strong> brings strategy, worry, and dragon sense.</li>
            </ul>
          </div>
        </div>
      `;
    }

    function companionBiosHtml() {
      return companionKeys().map(key => `
        <div class="bio">
          <strong>${companionMeta[key].name} — ${companionMeta[key].role}</strong>
          ${companionMeta[key].bio}
        </div>
      `).join("");
    }

    function partyPicker(title, intro, nextScene) {
      ui.screen = "picker";
      ui.picker = { title, intro, nextScene };
      ui.message = "";
      renderShell();
      render();
      saveGameToStorageOnly();
    }

    function renderPicker() {
      const game = document.getElementById("game");
      const p = ui.picker;
      const selected = state.party.length
        ? state.party.map(nameOf).join(", ")
        : "none";

      game.innerHTML = `
        <div class="card story">
          <div class="hud">
            <div class="pill">Courage: ${state.courage}</div>
            <div class="pill">Compassion: ${state.compassion}</div>
            <div class="pill">Cunning: ${state.cunning}</div>
            <div class="pill">Scott: ${state.scott}</div>
            <div class="pill">Party: ${selected}</div>
          </div>
          <p>${p.title}</p>
          <p>${p.intro}</p>
          <p class="small">Mar iah may choose any number of companions here — one, several, all five, or none. Read their strengths below, then toggle the names you want.</p>
          ${companionBiosHtml()}
          ${companionKeys().map(key => `
            <button data-key="${key}">${state.party.includes(key) ? "✓ " : ""}${companionMeta[key].name}</button>
          `).join("")}
          <button id="selectAll">Select All</button>
          <button id="clearAll">Clear All</button>
          <button id="continue">Continue</button>
        </div>
      `;

      game.querySelectorAll("button[data-key]").forEach(btn => {
        btn.onclick = () => {
          const key = btn.getAttribute("data-key");
          if (state.party.includes(key)) {
            state.party = state.party.filter(k => k !== key);
          } else {
            state.party.push(key);
          }
          saveGameToStorageOnly();
          render();
        };
      });

      game.querySelector("#selectAll").onclick = () => {
        state.party = companionKeys();
        saveGameToStorageOnly();
        render();
      };

      game.querySelector("#clearAll").onclick = () => {
        state.party = [];
        saveGameToStorageOnly();
        render();
      };

      game.querySelector("#continue").onclick = () => {
        ui.screen = p.nextScene;
        ui.picker = null;
        saveGameToStorageOnly();
        renderShell();
        render();
      };
    }

    function show(text, choices = [], extra = "") {
      const game = document.getElementById("game");
      game.innerHTML = `
        <div class="card story">
          <div class="hud">
            <div class="pill">Courage: ${state.courage}</div>
            <div class="pill">Compassion: ${state.compassion}</div>
            <div class="pill">Cunning: ${state.cunning}</div>
            <div class="pill">Scott: ${state.scott}</div>
            <div class="pill">Party: ${state.party.length ? state.party.map(nameOf).join(", ") : "none"}</div>
          </div>
          <p>${text}</p>
          ${extra}
          ${choices.map(c => `<button>${c.text}</button>`).join("")}
        </div>
      `;

      const buttons = game.querySelectorAll("button");
      choices.forEach((choice, i) => {
        buttons[i].onclick = choice.action;
      });
    }

    function end(text) {
      show(
        text,
        [
          { text: "Play Again", action: () => { clearSave(); resetGame(); renderShell(); render(); } },
          { text: "Back to Title", action: () => { ui.screen = "title"; ui.picker = null; ui.message = ""; renderShell(); render(); } }
        ]
      );
    }

    function guideScene() {
      ui.screen = "guide";
      renderShell();
      render();
    }

    function titleScene() {
      const game = document.getElementById("game");
      game.innerHTML = `
        <div class="card story">
          <p style="font-size:26px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px;">Title Screen</p>
          <p>
            Mariah, the kingdom’s knight, rides to rescue Prince Scott after a dragon takes him from the balcony.
            Choose companions, build bonds, and decide whether love, courage, or cunning will bring him home.
          </p>
          <p class="small">
            Save progress is stored in your browser. The companion panel on the right always shows who is with Mariah, what they do best, and how they feel about the journey.
          </p>
          ${ui.message ? `<p class="small">${ui.message}</p>` : ""}
          <button id="newGame">New Game</button>
          <button id="seeGuide">Companion Guide</button>
          <button id="saveNow" ${localStorage.getItem(SAVE_KEY) ? "" : "disabled"}>Save</button>
          <button id="continueFromTitle" ${localStorage.getItem(SAVE_KEY) ? "" : "disabled"}>Continue</button>
        </div>
      `;

      game.querySelector("#newGame").onclick = () => {
        clearSave();
        resetGame();
        ui.screen = "intro";
        renderShell();
        render();
        saveGameToStorageOnly();
      };

      game.querySelector("#seeGuide").onclick = () => {
        ui.screen = "guide";
        renderShell();
        render();
      };

      game.querySelector("#saveNow").onclick = () => {
        ui.message = "Game saved.";
        saveGameToStorageOnly();
        renderShell();
        render();
      };

      game.querySelector("#continueFromTitle").onclick = () => {
        continueGame();
      };
    }

    function guideSceneRender() {
      const game = document.getElementById("game");
      game.innerHTML = `
        <div class="card story">
          <p style="font-size:26px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px;">Companion Guide</p>
          ${companionBiosHtml()}
          <p class="small">
            Mariah can choose any number of companions at each selection screen — one, several, all five, or none.
            Their approval changes how they respond, and some can leave if Mariah treats them badly or ignores what they value.
          </p>
          <button id="backToTitle">Back to Title</button>
          <button id="startFromGuide">Start New Game</button>
        </div>
      `;

      game.querySelector("#backToTitle").onclick = () => {
        ui.screen = "title";
        ui.picker = null;
        renderShell();
        render();
      };

      game.querySelector("#startFromGuide").onclick = () => {
        clearSave();
        resetGame();
        ui.screen = "intro";
        renderShell();
        render();
        saveGameToStorageOnly();
      };
    }

    function introScene() {
      show(
`The balcony is warm with candlelight and summer air.

Mariah, tall and broad-shouldered in her knight's cloak, stands with Prince Scott beside the stone rail. His smile, as always, looks like it could end a war or start one.

"You keep staring," Scott says softly, amused. "Should I be worried?"

"Only if you keep looking this handsome in moonlight," Mariah answers.

He laughs under his breath. "Dangerous words from a knight who carries a sword like a promise."

Before she can answer, the sky cracks with a roar.

A dragon drops from the dark and seizes Scott in a blast of fire and claws.

"Mariah!" he shouts as the beast vanishes into the clouds.

Moments later, the king grabs her hands with shaking fury and fear. "Bring my son home."

And so the kingdom's songs change key.`,
        [
          { text: "Swear to save Scott", action: kingAppeal },
          { text: "Demand every detail first", action: () => { add("cunning", 1); kingAppeal(); } }
        ]
      );
    }

    function kingAppeal() {
      show(
`The king bows his head, more father than ruler now.

"The dragon struck near the northern ridge. Scott was taken alive. If there is a way to bring him back, it will be you."

Mariah feels the weight of the crown, the kingdom, and Scott's vanished smile all at once.

Somewhere beyond the mountain, he is waiting.`,
        [
          { text: "Set out immediately", action: roadPartySelect },
          { text: "Ask for resources and maps", action: () => { add("cunning", 1); roadPartySelect(); } }
        ]
      );
    }

    function roadPartySelect() {
      partyPicker(
        "Road to the north",
        "Choose who rides with you on the first leg of the journey.",
        "roadHub"
      );
    }

    function roadHub() {

  const revisit = seen("roadHub");
  if (!revisit) setFlag("roadHub");

  let text = revisit
    ? `Back on the road, the horses’ hooves keep the rhythm while Mariah and her companions pick up the conversation where they left off.
The air is colder now, but Scott is still the center of every thought.`
    : `The road narrows beneath gray trees and old stone markers.

Mariah can feel Scott in every mile, every heartbeat of silence.`;

  if (has("jasmine"))  text += "\nJasmine walks like she already knows three ways around the kingdom's eyes, and one way through its walls.";
  if (has("bailey"))    text += "\nBailey keeps glancing at footprints, bird tracks, and the wind as if all of them might confess something.";
  if (has("dahlia"))    text += "\nDahlia's blue fire flickers low in her palm, bright whenever she suspects a lie.";
  if (has("anderson"))  text += "\nAnderson rolls her shoulders like the world itself is something she could wrestle.";
  if (has("shayne"))    text += "\nShayne has already started muttering about supplies, routes, and the price of everyone else's poor judgment.";

  if (has("jasmine") && !seen("roadJasmine")) text += "\nJasmine catches Mariah's eye and smirks. 'The king taught you to fight. Scott taught you to worry. I can help with the sneaking.'";
  if (has("bailey") && !seen("roadBailey"))   text += "\nBailey clears her throat. 'If the dragon left tracks, I can find them. If it didn't, I can still probably find the snacks.'";
  if (has("dahlia") && !seen("roadDahlia"))   text += "\nDahlia tilts her head. 'If anyone lies to us, I'll know. The trick is deciding whether to let them think they got away with it.'";
  if (has("anderson") && !seen("roadAnderson")) text += "\nAnderson grins. 'If the dragon has a mouth, I have a sword. That seems fair.'";
  if (has("shayne") && !seen("roadShayne"))   text += "\nShayne sighs. 'If Scott were here, he'd already have made a joke about my face and my budget.'";
  if (!seen("roadScott")) text += "\nMariah's thoughts keep turning to Scott's smile, the one that always found her first.";

  const choices = [];

  if (!seen("roadScott")) choices.push({ text: "Trade a private memory of the balcony with Scott", action: roadScottMoment });
  if (has("jasmine") && !seen("roadJasmine")) choices.push({ text: "Ask Jasmine about secret tunnels and hidden exits", action: roadJasmineMoment });
  if (has("bailey") && !seen("roadBailey")) choices.push({ text: "Walk beside Bailey and listen to her read the land", action: roadBaileyMoment });
  if (has("dahlia") && !seen("roadDahlia")) choices.push({ text: "Ask Dahlia how she spots a lie before it blooms", action: roadDahliaMoment });
  if (has("anderson") && !seen("roadAnderson")) choices.push({ text: "Let Anderson tell you how she really fights", action: roadAndersonMoment });
  if (has("shayne") && !seen("roadShayne")) choices.push({ text: "Press Shayne for anything he knows about the dragon", action: roadShayneMoment });

  if (has("bailey") && has("dahlia") && !seen("roadBD")) choices.push({ text: "Let Bailey and Dahlia tease each other", action: roadBaileyDahliaBanter });
  if (has("shayne") && has("anderson") && !seen("roadSA")) choices.push({ text: "Watch Shayne and Anderson bicker like old friends", action: roadShayneAndersonBanter });

  choices.push({ text: "Push onward and camp before dusk", action: villageDetour });

  show(text, choices);

}
function roadScottMoment() {

  setFlag("roadScott");
  add("scott", 2);
  add("courage", 1);
  show(
`Mariah lets herself remember the balcony.

Scott's hand had hovered near hers, never quite touching, as if he were asking permission with every breath. He had said, with that maddening wit of his, "If you keep looking at me like that, I'm going to start believing you mean it."

Mariah smiles despite the ache.

"I do mean it," she tells the empty road.

A breeze lifts the edge of her cloak, and she can almost hear him answer: "Good. Because I was hoping you meant that kiss too."

Mariah exhales a laugh that sounds dangerously close to a promise.`,
    [
      { text: "Return to the road", action: roadHub }
    ]
  );

}
function roadJasmineMoment() {

  setFlag("roadJasmine");
  adjustApproval("jasmine", 1);
  add("cunning", 1);
  show(
`Jasmine lowers her voice and points to a vine-choked ridge.

"There are old service tunnels under the chapel ruins. I know three exits, two hidden doors, and one priest who owed me a favor for twenty-eight very embarrassing evenings."

Mariah blinks. "You sound proud of that."

"I am. Court romance is mostly dreadful poetry and inconvenient timing. Mine at least came with useful maps."

Mariah huffs a laugh. "Did any of them write songs about you?"

"Two did," Jasmine says. "One was flattering. One was wildly inaccurate. Both were useful enough to remember."

      { text: "Ask him if Scott would be annoyed by this plan", action: () => { add("scott", 1); canyonHub(); } }
    ]
  );

}
function finalPrep() {

  const leavers = state.party.filter(k => state.approval[k] <= -2);

  if (leavers.length) {
    let text = `As the cave mouth darkens ahead, not everyone is willing to go further.

`;

    leavers.forEach(k => {
      if (k === "jasmine") text += "Jasmine crosses her arms. 'I will not be bullied by a dragon into a stupid entrance. I will, however, mark the better one.' She points to the hidden tunnel and steps aside.\n";
      if (k === "bailey") text += "Bailey swallows hard and shakes her head. 'I can find the trail back out. I can't promise I can watch someone die in there.' She stays behind with her bow lowered.\n";
      if (k === "dahlia") text += "Dahlia's blue fire goes still. 'If you choose lies over sense, I'm not helping you walk into them.' She remains outside, furious and brilliant.\n";
      if (k === "anderson") text += "Anderson exhales through her nose. 'I came to save Scott, not to be treated like a delay.' She hands Mariah a grim nod and stands guard at the entrance.\n";
      if (k === "shayne") text += "Shayne adjusts his notes with a hard swallow. 'I can't follow a plan that ignores Scott's life.' He stays at the threshold, upset but steady.\n";
    });

    text += "\nThe ones who remain tighten into a smaller circle around Mariah. The cave is close now. So is the truth.";

    state.party = state.party.filter(k => state.approval[k] > -2);

    show(text, [{ text: "Enter the cave", action: finalCaveChoice }]);
    return;
  }

  show(
`The cave breathes cold air and old smoke.

Somewhere inside, Scott is there.
Somewhere inside, the dragon is waiting.
And Mariah's companions hold the line around her like a second heartbeat.

The moment feels smaller than a battle and larger than a promise.`,
    [{ text: "Enter the cave", action: finalCaveChoice }]
  );

}
function finalCaveChoice() {

  let text = `The cave opens into a chamber lit by fire and shards of trapped gold.

Scott is chained on a stone ledge near the center, bloodied but defiant. Even now, he looks up with that impossible smile.

"Mariah," he says, voice rough and warm all at once. "You took your time."

The dragon lifts its head from the hoard.

"Good," it rumbles. "The knight arrives. The prince matters more than the crown."

`;
  if (has("jasmine")) text += "Jasmine murmurs, 'The left wall is false stone. There may be another path behind it.'\n";
  if (has("bailey")) text += "Bailey spots a trail of claw-marks and a loose chain anchor. 'He was moved recently. That can help us.'\n";
  if (has("dahlia")) text += "Dahlia's eyes narrow. 'The dragon has an illusion folded around the room. I can break it if you give me a second.'\n";
  if (has("anderson")) text += "Anderson rolls one shoulder. 'Tell me where to hit. I'll do the rest.'\n";
  if (has("shayne")) text += "Shayne looks at Scott, terrified and furious in equal measure. 'He is trying to pretend he is fine. Obviously not.'\n";
  text += "\nScott's gaze finds Mariah's and lingers there like a vow.\n'You came for me.'\n\nMariah can answer in more than one way.";

  show(
    text,
    [
      { text: "Tell Scott you always would", action: () => { add("scott", 2); finalBattle(); } },
      { text: "Use Jasmine's tunnel route", action: () => { if (has("jasmine")) add("cunning", 2); finalBattle(); } },
      { text: "Order a direct assault", action: () => { add("courage", 2); finalBattle(); } },
      { text: "Try to negotiate with the dragon", action: () => { add("cunning", 1); finalBattle(); } }
    ]
  );

}
function finalBattle() {
      let support = 0;
      state.party.forEach(k => {
        if (state.approval[k] >= 0) support += 1;
      });

      let intro = `The dragon rises, vast as a ruin and older than the songs about Mariah.

Fire blooms across the chamber.

Scott strains at the chains and shouts, "Mariah, don't do something heroic and irreversible!"

The dragon laughs.

Mariah has ${support} active support voice${support === 1 ? "" : "s"} with her in the cave, and every one of them matters.`;

      show(
        intro,
        [
          { text: "Trust Scott and reach for the bond between them", action: trustScottEnding },
          { text: "Attack the dragon head-on", action: attackEnding },
          { text: "Use finesse and negotiation", action: negotiateEnding },
          { text: "Exploit the hidden tunnel route", action: tunnelEnding }
        ]
      );
    }

    function trustScottEnding() {

  const enough = state.scott >= 7 && state.courage >= 2;

  if (enough) {
    show(
`Mariah stops fighting the shape of the moment and chooses Scott.

Not the fear. Not the fire.
Him.

Scott's expression changes first into disbelief, then into something tender enough to hurt.

The dragon lunges, but Dahlia's blue flame blinds it; Anderson drives it back; Bailey finds the chain anchor; Shayne shouts the timing; and Jasmine's hidden route lets Mariah reach Scott before the second strike.

She tears the chains free.

Scott stumbles into her arms, laughing once, breathless and shaking. "You are outrageous."

Mariah cups his face. "And you are home."

Jasmine watches from the side and mutters, "Disgusting. Beautiful. Effective."

Scott lowers his forehead to Mariah's. "I love you."

This time, there is nothing in the way.`,
      [
        { text: "Kiss him", action: () => end("The cave goes silent except for their breathing and the dragon's fading roar. Mariah kisses Scott like a promise fulfilled.") },
        { text: "Hold him close", action: () => end("Mariah holds him tight, and for once neither of them has to be brave alone.") }
      ]
    );
  } else {
    show(
`Mariah reaches for Scott, but the dragon's magic snaps tighter than expected.

Scott meets her eyes anyway, forcing a smile through the pain. "That was still the right choice," he says.

The rescue works — almost. The chains break, the ledge gives way, and Scott gets free, but the dragon takes a wound that sends fire through the whole chamber.

The escape is messy, beautiful, and too close.

Scott survives.

The kingdom will sing of it.

Mariah will remember the cost.

When they finally reach the mouth of the cave, Scott is shaking with exhaustion and smiling only because Mariah is there.`,
      [
        { text: "Gather your people and flee", action: () => end("Scott is saved, but the victory feels bruised and unfinished. Still, he is alive, and his hand finds Mariah's in the smoke.") },
        { text: "Swear you'll finish this another day", action: () => end("The dragon retreats into the dark. Scott leans against Mariah as the cave collapses behind them. They made it out together — barely.") }
      ]
    );
  }

}
function attackEnding() {
      const strongEnough = state.courage >= 4 && (state.approval.anderson >= 0 || state.approval.bailey >= 0);

      if (strongEnough) {
        show(
`Mariah charges.

Anderson meets the dragon head-on, blade screaming against scale. Bailey calls out the weak angle beneath the left wing. Shayne yells the timing. Jasmine points to the hidden support beam. Dahlia wraps the chamber in blue fire.

Scott, still chained, laughs hoarsely through the pain. "I always did love it when you were terrifying."

Mariah drives the dragon backward with pure force and perfect timing.

The beast falls.

The cave shakes. Gold rains from the ceiling. Scott is freed, breathless and grinning despite everything.

"You are legend," he says.

Mariah, flushed and fierce, answers, "Only if you survive long enough to say it again."`,
          [
            { text: "Take Scott home", action: () => end("The dragon falls. The kingdom lives. Scott lives. And the songs about Mariah become louder than ever.") },
            { text: "Let him steal one kiss before leaving", action: () => end("In the wreckage of the cave, Scott kisses Mariah like he has waited his whole life for the right ending.") }
          ]
        );
      } else {
        end("Mariah swings hard, but the dragon is too much. Fire floods the chamber. Darkness follows.");
      }
    }

    function negotiateEnding() {
      const enough = state.cunning >= 4 && state.approval.shayne >= 0;

      if (enough) {
        show(
`Mariah lowers her blade just enough to make the dragon hesitate.

Dahlia's eyes narrow, reading the lie in the creature's breathing.
Shayne calls out the pattern in its hoard and its fear.
Jasmine spots the old bond-runes carved into the cave wall.
Bailey notices the chain route.
Anderson doesn't lower her sword at all, which is somehow also helpful.

Mariah speaks to the dragon as if it can hear reason and consequence both.

It can.

The creature wanted leverage, not war.

Scott looks up, stunned, as the dragon's grip loosens. "You negotiated with it?"

Mariah glances back. "I also threatened it."

Scott laughs, still shackled, and somehow that laugh helps break the spell.`,
          [
            { text: "Finish the deal and free Scott", action: () => end("The dragon yields. Scott is returned. The kingdom will argue for years about whether this counts as mercy or brilliance.") },
            { text: "Refuse the dragon's final demand", action: () => end("Mariah outplays the creature and drags Scott out by choosing a smarter path than the monster expected.") }
          ]
        );
      } else {
        end("The dragon likes the idea of a bargain better than the reality of one. It strikes before Mariah can finish the first sentence.");
      }
    }

    function tunnelEnding() {
      const enough = has("jasmine") && state.approval.jasmine >= 0;

      if (enough) {
        show(
`Jasmine snaps her fingers and points Mariah toward the false wall.

"There. Move."

The hidden passage opens behind the dragon's hoard, narrow and old and exactly the sort of thing only Jasmine would know about.

Bailey spots the safest footing.
Dahlia blinds the guard-fire.
Anderson cuts the chain lock.
Shayne gives the timing.
Mariah slips through the tunnel like a blade through silk.

Scott sees her first and breathes, "That is absurdly attractive."

Mariah snorts despite herself. "Save the compliments until we're outside."

"Never," he says, because of course he doesn't.`,
          [
            { text: "Free Scott and run", action: () => end("The tunnel route wins the day. Scott is alive, the dragon is furious, and Mariah is already planning how to kiss him once they're in the open air.") },
            { text: "Free Scott and turn back on the dragon", action: () => end("With Jasmine's route and the others' support, Mariah turns the cave into a trap and carries Scott out through the smoke.") }
          ]
        );
      } else {
        end("Without Jasmine's trust, the tunnel leads into a dead end and the dragon notices Mariah first.");
      }
    }

    const SCENES = {
      title: titleScene,
      guide: guideSceneRender,
      intro: introScene,
      kingAppeal,
      roadPartySelect,
      roadHub,
      roadScottMoment,
      roadJasmineMoment,
      roadBaileyMoment,
      roadDahliaMoment,
      roadAndersonMoment,
      roadShayneMoment,
      roadBaileyDahliaBanter,
      roadShayneAndersonBanter,
      villageDetour,
      campHub,
      campScottMoment,
      campJasmineMoment,
      campBaileyMoment,
      campDahliaMoment,
      campAndersonMoment,
      campShayneMoment,
      campBaileyDahliaBanter,
      campShayneAndersonBanter,
      canyonPartySelect,
      canyonHub,
      canyonScottMoment,
      canyonJasmineMoment,
      canyonBaileyMoment,
      canyonDahliaMoment,
      canyonAndersonMoment,
      canyonShayneMoment,
      finalPrep,
      finalCaveChoice,
      finalBattle
    };

    function render() {
      renderPanel();

      if (ui.screen === "title") {
        titleScene();
      } else if (ui.screen === "guide") {
        guideSceneRender();
      } else if (ui.screen === "picker") {
        renderPicker();
      } else if (SCENES[ui.screen]) {
        SCENES[ui.screen]();
      } else {
        ui.screen = "title";
        titleScene();
      }

      renderShell();
      saveGameToStorageOnly();
    }

    function continueGame() {
      if (loadGame()) {
        renderShell();
        render();
      } else {
        ui.message = "No saved game found yet.";
        renderShell();
        render();
      }
    }

    function bindTopButtons() {
      document.getElementById("saveBtn").onclick = () => {
        if (ui.screen !== "title") {
          ui.message = "Game saved.";
          saveGameToStorageOnly();
          renderShell();
          render();
        }
      };

      document.getElementById("continueBtn").onclick = continueGame;

      document.getElementById("newBtn").onclick = () => {
        clearSave();
        resetGame();
        ui.screen = "intro";
        renderShell();
        render();
        saveGameToStorageOnly();
      };

      document.getElementById("guideBtn").onclick = () => {
        ui.screen = "guide";
        renderShell();
        render();
      };
    }

    bindTopButtons();
    renderShell();

    if (localStorage.getItem(SAVE_KEY)) {
      ui.message = "A saved game is available.";
    }
    render();
  </script>
</body>
</html>
